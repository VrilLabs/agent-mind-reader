query RepositorySnapshot($owner: String!, $name: String!, $after: String) {
  repository(owner: $owner, name: $name) {
    id
    nameWithOwner
    updatedAt
    defaultBranchRef {
      target {
        ... on Commit {
          oid
          committedDate
        }
      }
    }
    issues(first: 50, after: $after, orderBy: {field: UPDATED_AT, direction: DESC}) {
      pageInfo { hasNextPage endCursor }
      nodes {
        id
        number
        title
        state
        updatedAt
        url
      }
    }
  }
}